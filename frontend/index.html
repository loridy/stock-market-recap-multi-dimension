<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Recap Viewer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #0b1020; color: #e8ecf1; }
      .row { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
      input, button { padding:8px 10px; border-radius:8px; border:1px solid #334; background:#11162a; color:#fff; }
      .card { background:#11162a; border:1px solid #223; border-radius:10px; padding:14px; margin:10px 0; }
      h1,h2,h3 { margin: 8px 0; }
      ul { margin-top:6px; }
      code { background:#1a213b; padding:2px 6px; border-radius:6px; }
      .muted { color:#9fb0c5; }
    </style>
  </head>
  <body>
    <h1>Stock Market Recap Viewer</h1>
    <div class="row">
      <label>Date:</label>
      <input id="date" type="date" />
      <button id="load">Load Report</button>
      <span class="muted" id="status"></span>
    </div>
    <div id="app"></div>

    <script>
      const statusEl = document.getElementById('status');
      const app = document.getElementById('app');
      const dateInput = document.getElementById('date');
      dateInput.value = new Date().toISOString().slice(0,10);

      function list(items){ return `<ul>${(items||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`; }

      async function loadReport() {
        const d = dateInput.value;
        const path = `../reports/${d}/report.json`;
        statusEl.textContent = `Loading ${path} ...`;
        app.innerHTML = '';
        try {
          const res = await fetch(path);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const r = await res.json();
          statusEl.textContent = 'Loaded';

          app.innerHTML = `
            <div class="card"><h2>${r.project}</h2><div class="muted">Date: ${r.date} | Regime: <code>${r.current_regime}</code></div></div>
            <div class="card"><h3>Executive Summary</h3>${list(r.executive_summary)}</div>
            <div class="card"><h3>Analyst Views</h3>${(r.analyst_views||[]).map(v=>`
              <h4>${v.analyst}</h4>
              <div class="muted">Focus: ${v.focus}</div>
              <b>Highlights</b>${list(v.highlights)}
              <b>Risks</b>${list(v.risks)}
              <b>Actions</b>${list(v.actions)}
            `).join('')}</div>
            <div class="card"><h3>Next Actions</h3>${list(r.next_actions)}</div>
          `;
        } catch (e) {
          statusEl.textContent = `Failed: ${e.message}`;
          app.innerHTML = `<div class="card">No report found for <code>${dateInput.value}</code>. Run:<br/><code>npm run recap -- --date ${dateInput.value} --analyst default --regime Mixed</code></div>`;
        }
      }

      document.getElementById('load').addEventListener('click', loadReport);
      loadReport();
    </script>
  </body>
</html>
