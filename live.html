<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Recap Live News</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background:#0b1020; color:#e8ecf1; }
      .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
      .card { background:#11162a; border:1px solid #223; border-radius:10px; padding:14px; margin:10px 0; }
      .muted { color:#9fb0c5; }
      a { color:#8cc8ff; }
      button { padding:8px 10px; border-radius:8px; border:1px solid #334; background:#1f6feb; color:#fff; }
      ul { line-height:1.5; }
    </style>
  </head>
  <body>
    <h1>📰 Live News Feed</h1>
    <div class="row">
      <a href="/">← Back to Main</a>
      <button id="refreshNow">Refresh Now</button>
      <span id="status" class="muted"></span>
    </div>

    <div class="card">
      <div><b>Auto fetch interval:</b> <span id="interval">-</span> sec</div>
      <div><b>Last fetch time:</b> <span id="updatedAt">-</span></div>
      <div><b>Status:</b> <span id="liveStatus">-</span></div>
      <div id="liveError" class="muted"></div>
    </div>

    <div class="card">
      <h3>Latest News (multi-source)</h3>
      <ul id="newsList"></ul>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      function fmtHkt(iso){
        if (!iso) return '—';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        const p = (n)=>String(n).padStart(2,'0');
        // Force Asia/Hong_Kong display
        const parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: 'Asia/Hong_Kong',
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false
        }).formatToParts(d).reduce((a,x)=>{a[x.type]=x.value; return a;}, {});
        return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second} (HKT)`;
      }

      function renderNews(items=[]){
        $('newsList').innerHTML = items.map(n => {
          const link = /^https?:\/\//.test(n.url || '')
            ? `<a href="${n.url}" target="_blank" rel="noopener noreferrer">${n.title}</a>`
            : (n.title || 'Untitled');
          return `<li>${link} <span class="muted">— ${n.source || ''}${n.published_at ? ' | '+fmtHkt(n.published_at) : ''}</span></li>`;
        }).join('');
      }

      async function loadSnapshot(){
        $('status').textContent = 'Loading...';
        const res = await fetch('/api/live/snapshot');
        const d = await res.json();
        $('interval').textContent = d.interval_seconds || 60;
        $('updatedAt').textContent = fmtHkt(d.updated_at);
        $('liveStatus').textContent = d.status || '—';
        $('liveError').textContent = d.error ? `Error: ${d.error}` : '';
        renderNews(d.news || []);
        $('status').textContent = 'Loaded';
      }

      async function refreshNow(){
        $('status').textContent = 'Refreshing now...';
        await fetch('/api/live/refresh', { method:'POST' });
        await loadSnapshot();
      }

      $('refreshNow').addEventListener('click', refreshNow);
      loadSnapshot();
      setInterval(loadSnapshot, 10000);
    </script>
  </body>
</html>
