<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Recap App</title>
    <style>
      :root { --bg:#0b1020; --panel:#11162a; --line:#283454; --text:#e8ecf1; --muted:#9fb0c5; }
      body { font-family: Arial, sans-serif; margin: 24px; background: var(--bg); color: var(--text); }
      .row { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
      input, button, textarea, select { padding:8px 10px; border-radius:8px; border:1px solid #334; background:#11162a; color:#fff; }
      .btn-primary { background:#1f6feb; border-color:#2b7fff; color:#fff; font-weight:600; }
      .btn-success { background:#1f8f4e; border-color:#2ea362; color:#fff; font-weight:600; }
      .btn-warning { background:#8b5a00; border-color:#a36a00; color:#fff; font-weight:600; }
      .grid { display:grid; gap:12px; grid-template-columns: repeat(12, 1fr); }
      .card { background:var(--panel); border:1px solid #223; border-radius:10px; padding:14px; margin:10px 0; }
      .span-6 { grid-column: span 6; } .span-12 { grid-column: span 12; }
      @media (max-width: 1000px) { .span-6 { grid-column: span 12; } }
      h1,h2,h3 { margin:8px 0; }
      ul { margin-top:6px; }
      code { background:#1a213b; padding:2px 6px; border-radius:6px; }
      .muted { color:var(--muted); } .warn { color:#ffd280; }
      a { color:#8cc8ff; }
      .table-wrap { overflow:auto; }
      table { width:100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom:1px solid var(--line); padding:8px 6px; text-align:right; white-space: nowrap; }
      th:first-child, td:first-child { text-align:left; }
      .up { color:#63d27d; } .down { color:#ff6d6d; } .neutral { color:#c6d0e0; }
      .empty { border:1px dashed #3a4a74; border-radius:8px; padding:10px; color:#c6d0e0; }
      .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display:none; align-items:flex-start; justify-content:center; padding:24px; z-index: 20; }
      .overlay.show { display:flex; }
      .modal { width:min(980px, 95vw); max-height:90vh; overflow:auto; background:#0f1528; border:1px solid #334; border-radius:12px; padding:14px; }
      .settings-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
      .settings-grid textarea { min-height:56px; width:100%; }
    </style>
  </head>
  <body>
    <h1>Stock Market Recap App</h1>
    <div class="row">
      <label>Date:</label>
      <input id="date" type="date" />
      <button id="load" class="btn-primary">Load Report</button>
      <button id="openSettings" class="btn-warning">⚙️ Settings</button>
      <a href="/live" style="color:#8cc8ff; text-decoration:none; border:1px solid #334; padding:8px 10px; border-radius:8px;">📡 Live</a>
      <span class="muted" id="status"></span>
    </div>
    <div id="app"></div>

    <div id="settingsOverlay" class="overlay" aria-hidden="true">
      <div class="modal">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:0;">Settings</h2>
          <button id="closeSettings">Close</button>
        </div>
        <div class="card">
          <h3>Ticker Buckets</h3>
          <div class="muted">Comma-separated tickers per bucket (e.g. indices: SPY,QQQ,3033.HK)</div>
          <div class="settings-grid">
            <div><label>Indices</label><textarea id="cfg_indices"></textarea></div>
            <div><label>Sectors</label><textarea id="cfg_sectors"></textarea></div>
            <div><label>Commodities</label><textarea id="cfg_commodities"></textarea></div>
            <div><label>Yields</label><textarea id="cfg_yields"></textarea></div>
            <div><label>FX</label><textarea id="cfg_fx"></textarea></div>
            <div><label>Volatility</label><textarea id="cfg_volatility"></textarea></div>
            <div><label>MAG7</label><textarea id="cfg_mag7"></textarea></div>
            <div><label>Watchlist</label><textarea id="cfg_watchlist"></textarea></div>
          </div>
          <div class="row">
            <button id="validateTickers" class="btn-warning">Validate Tickers</button>
            <button id="saveInstruments" class="btn-success">Save Ticker Settings</button>
          </div>
          <div id="tickerValidation" class="muted"></div>
        </div>

        <div class="card">
          <h3>Analyst Profiles</h3>
          <div class="row">
            <select id="analystSelect" style="min-width:260px"></select>
            <button id="loadAnalyst">Load</button>
          </div>
          <div class="settings-grid">
            <div><label>ID</label><input id="an_id" placeholder="analyst-tech-growth" /></div>
            <div><label>Name</label><input id="an_name" /></div>
            <div><label>Style</label><input id="an_style" /></div>
            <div><label>Horizon</label><input id="an_horizon" /></div>
            <div><label>Assets</label><textarea id="an_assets"></textarea></div>
            <div><label>Sectors</label><textarea id="an_sectors"></textarea></div>
            <div><label>Tickers</label><textarea id="an_tickers"></textarea></div>
            <div><label>Themes</label><textarea id="an_themes"></textarea></div>
            <div><label>Key Metrics</label><textarea id="an_key_metrics"></textarea></div>
            <div><label>Sections</label><textarea id="an_sections"></textarea></div>
          </div>
          <button id="saveAnalyst" class="btn-success">Save Analyst (Create/Update)</button>
        </div>

        <div id="settingsStatus" class="muted"></div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const app = document.getElementById('app');
      const dateInput = document.getElementById('date');
      dateInput.value = new Date().toISOString().slice(0,10);

      const expectedShapes = [
        'market_heatmap.indices[]', 'market_heatmap.commodities[]',
        'market_heatmap.yields[]', 'market_heatmap.fx[]', 'breaking_news[]'
      ];

      function list(items){ return `<ul>${(items||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`; }
      function numClass(v){ return v > 0 ? 'up' : v < 0 ? 'down' : 'neutral'; }
      function pct(v){ const n = Number(v); return Number.isFinite(n) ? `${n>0?'+':''}${n.toFixed(2)}%` : '—'; }
      function abs(v){ const n = Number(v); return Number.isFinite(n) ? `${n>0?'+':''}${n.toFixed(2)}` : '—'; }
      function px(v){ const n = Number(v); return Number.isFinite(n) ? n.toLocaleString(undefined,{maximumFractionDigits:4}) : '—'; }

      function renderHeatmapTable(title, rows, showYieldLabel=false) {
        if (!Array.isArray(rows) || rows.length === 0) {
          return `<div class="card span-6"><h3>${title}</h3><div class="empty">No data in report JSON.</div></div>`;
        }
        return `
          <div class="card span-6">
            <h3>${title}</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Asset</th><th>${showYieldLabel ? 'Current Yield' : 'Current Price'}</th><th>1D</th><th>1D %</th><th>5D %</th><th>1M %</th><th>YTD %</th><th>1Y %</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map(r => `
                    <tr>
                      <td>${r.name || 'N/A'} <span class="muted">${r.ticker ? `(${r.ticker})` : ''}</span></td>
                      <td>${px(r.current)}</td>
                      <td class="${numClass(r.d1)}">${abs(r.d1)}</td>
                      <td class="${numClass(r.d1Pct)}">${pct(r.d1Pct)}</td>
                      <td class="${numClass(r.d5Pct)}">${pct(r.d5Pct)}</td>
                      <td class="${numClass(r.m1Pct)}">${pct(r.m1Pct)}</td>
                      <td class="${numClass(r.ytdPct)}">${pct(r.ytdPct)}</td>
                      <td class="${numClass(r.y1Pct)}">${pct(r.y1Pct)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
      }

      function renderNews(news){
        if (!Array.isArray(news) || news.length === 0) {
          return '<div class="empty">No breaking_news in report JSON.</div>';
        }
        return `<ul>${news.slice(0,3).map(n => {
          const t = n.title || 'Untitled';
          const s = n.source || 'Source';
          const u = n.url || '#';
          const safeLink = /^https?:\/\//.test(u);
          return `<li>${safeLink ? `<a href="${u}" target="_blank" rel="noopener noreferrer">${t}</a>` : t} <span class="muted">— ${s}</span></li>`;
        }).join('')}</ul>`;
      }

      function renderFocus(focus){
        const keys = ['mark','alex','loridy','freya'];
        return keys.map(k => {
          const item = focus?.[k];
          if (!item) return `<div class="card span-6"><h3>Analyst Focus: ${k}</h3><div class="empty">No data</div></div>`;
          return `<div class="card span-6"><h3>Analyst Focus: ${item.title || k}</h3><div class="muted">${item.subtitle || ''}</div>${list(item.bullets || [])}</div>`;
        }).join('');
      }

      const $ = (id) => document.getElementById(id);
      const listCsv = (arr=[]) => arr.join(',');
      const parseCsv = (s='') => String(s).split(',').map(x => x.trim()).filter(Boolean);
      let settingsCache = { instruments: {}, analysts: [] };

      function setSettingsStatus(msg, ok=true){
        const el = $('settingsStatus');
        el.style.color = ok ? '#9fd3a8' : '#ff8f8f';
        el.textContent = msg;
      }

      function toTickerMap(instruments){
        const out = {};
        for (const [k, v] of Object.entries(instruments || {})) out[k] = (v || []).map(x => x.ticker);
        return out;
      }

      async function loadSettings(){
        const res = await fetch('/api/settings');
        const data = await res.json();
        settingsCache = data;
        const m = toTickerMap(data.instruments || {});
        ['indices','sectors','commodities','yields','fx','volatility','mag7','watchlist'].forEach(k => {
          const el = $('cfg_' + k);
          if (el) el.value = listCsv(m[k] || []);
        });

        const sel = $('analystSelect');
        sel.innerHTML = '';
        (data.analysts || []).forEach(a => {
          const o = document.createElement('option');
          o.value = a.id; o.textContent = `${a.id} — ${a.name || ''}`; sel.appendChild(o);
        });
      }

      function fillAnalyst(a){
        if (!a) return;
        $('an_id').value = a.id || '';
        $('an_name').value = a.name || '';
        $('an_style').value = a.focus?.style || '';
        $('an_horizon').value = a.focus?.horizon || '';
        $('an_assets').value = listCsv(a.coverage?.assets || []);
        $('an_sectors').value = listCsv(a.coverage?.sectors || []);
        $('an_tickers').value = listCsv(a.watchlist?.tickers || []);
        $('an_themes').value = listCsv(a.watchlist?.themes || []);
        $('an_key_metrics').value = listCsv(a.focus?.key_metrics || []);
        $('an_sections').value = listCsv(a.output?.sections || []);
      }

      function collectInstrumentsFromForm(){
        const keys = ['indices','sectors','commodities','yields','fx','volatility','mag7','watchlist'];
        const instruments = {};
        for (const k of keys) {
          const tickers = parseCsv($('cfg_'+k).value.toUpperCase());
          instruments[k] = tickers.map(t => ({ ticker: t, name: t }));
        }
        return instruments;
      }

      async function validateTickers(){
        const instruments = collectInstrumentsFromForm();
        const tickers = [...new Set(Object.values(instruments).flat().map(x => x.ticker))];
        const res = await fetch('/api/settings/validate-tickers', {
          method: 'POST', headers: {'content-type':'application/json'},
          body: JSON.stringify({ tickers })
        });
        const out = await res.json();
        if (!res.ok || !out.ok) throw new Error(out.error || 'Validation failed');

        const ok = out.results.filter(x => x.valid);
        const bad = out.results.filter(x => !x.valid);
        const lines = [
          `Checked ${out.results.length} tickers: ✅ ${ok.length} valid / ❌ ${bad.length} invalid`,
          ...bad.slice(0,8).map(x => `Invalid: ${x.ticker} (${x.marketGuess})`),
          ...ok.slice(0,8).map(x => `OK: ${x.ticker} (${x.marketGuess}) ${x.exchange || ''}`),
        ];
        $('tickerValidation').textContent = lines.join(' | ');
      }

      async function saveInstruments(){
        const instruments = collectInstrumentsFromForm();
        const res = await fetch('/api/settings/instruments', {
          method: 'POST', headers: {'content-type':'application/json'},
          body: JSON.stringify({ instruments })
        });
        const out = await res.json();
        if (!res.ok || !out.ok) throw new Error(out.error || 'Save failed');
      }

      async function saveAnalyst(){
        const payload = {
          id: $('an_id').value,
          name: $('an_name').value,
          style: $('an_style').value,
          horizon: $('an_horizon').value,
          assets: $('an_assets').value,
          sectors: $('an_sectors').value,
          tickers: $('an_tickers').value,
          themes: $('an_themes').value,
          key_metrics: $('an_key_metrics').value,
          sections: $('an_sections').value,
        };
        const res = await fetch('/api/settings/analyst', {
          method: 'POST', headers: {'content-type':'application/json'},
          body: JSON.stringify(payload)
        });
        const out = await res.json();
        if (!res.ok || !out.ok) throw new Error(out.error || 'Save analyst failed');
      }

      async function loadReport() {
        const d = dateInput.value;
        const path = `/reports/${d}/report.json`;
        statusEl.textContent = `Loading ${path} ...`;
        app.innerHTML = '';

        try {
          const res = await fetch(path);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const r = await res.json();
          statusEl.textContent = 'Loaded';

          app.innerHTML = `
            <div class="card">
              <h2>${r.project || 'Stock Market Recap'}</h2>
              <div class="muted">Date: ${r.date || d} | Regime: <code>${r.current_regime || 'N/A'}</code></div>
              <div class="warn" style="margin-top:8px;">This frontend only renders fields present in report.json (no hardcoded fake market/news links).</div>
            </div>

            <div class="card"><h3>Expected data fields</h3><div class="muted">${expectedShapes.join(' · ')}</div></div>

            <div class="grid">
              ${renderHeatmapTable('Major Indices (Heatmap)', r.market_heatmap?.indices)}
              ${renderHeatmapTable('Commodities (Heatmap)', r.market_heatmap?.commodities)}
              ${renderHeatmapTable('Yields (Heatmap)', r.market_heatmap?.yields, true)}
              ${renderHeatmapTable('FX (Heatmap)', r.market_heatmap?.fx)}
              ${renderHeatmapTable('Custom Watchlist', r.market_heatmap?.watchlist)}

              <div class="card span-12"><h3>Breaking News</h3>${renderNews(r.breaking_news)}</div>

              ${renderFocus(r.analyst_focus)}

              <div class="card span-12"><h3>Executive Summary</h3>${list(r.executive_summary)}</div>
              <div class="card span-12"><h3>Next Actions</h3>${list(r.next_actions)}</div>
            </div>`;
        } catch (e) {
          statusEl.textContent = `Failed: ${e.message}`;
          app.innerHTML = `<div class="card">No report found for <code>${d}</code>.</div>`;
        }
      }

      $('load').addEventListener('click', loadReport);
      $('openSettings').addEventListener('click', async () => {
        $('settingsOverlay').classList.add('show');
        setSettingsStatus('Loading settings...');
        try { await loadSettings(); setSettingsStatus('Settings loaded'); }
        catch (e) { setSettingsStatus(`Failed to load settings: ${e.message}`, false); }
      });
      $('closeSettings').addEventListener('click', () => $('settingsOverlay').classList.remove('show'));
      $('loadAnalyst').addEventListener('click', () => {
        const id = $('analystSelect').value;
        const a = (settingsCache.analysts || []).find(x => x.id === id);
        fillAnalyst(a);
      });
      $('validateTickers').addEventListener('click', async () => {
        setSettingsStatus('Validating tickers...');
        try { await validateTickers(); setSettingsStatus('Validation complete.'); }
        catch (e) { setSettingsStatus(e.message, false); }
      });
      $('saveInstruments').addEventListener('click', async () => {
        try { await saveInstruments(); setSettingsStatus('Ticker settings saved. Now run recap again, then click Load Report.'); }
        catch (e) { setSettingsStatus(e.message, false); }
      });
      $('saveAnalyst').addEventListener('click', async () => {
        try {
          await saveAnalyst();
          await loadSettings();
          setSettingsStatus('Analyst saved.');
        } catch (e) {
          setSettingsStatus(e.message, false);
        }
      });

      loadReport();
    </script>
  </body>
</html>
